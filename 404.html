<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bob Innovation Hub</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // Encode the full path into the query string and redirect to the root,
    // where index.html will decode it and call history.replaceState.
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    // Encode path segments after the repo root (handle both apex domain and /repo-name/ base)
    var encodedPath = path + (search ? '~and~' + search.slice(1) : '') + hash;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(encodedPath)
    );
  </script>
</head>
<body></body>
</html>
