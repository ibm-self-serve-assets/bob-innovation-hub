name: Notify on Pages CMS Commit

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run if the commit message contains "(via Pages CMS)"
    if: contains(github.event.head_commit.message, '(via Pages CMS)')

    steps:
      - name: Build Pages CMS edit URL
        id: cms_url
        run: |
          FILES='${{ toJson(github.event.head_commit.modified) }}'
          ADDED='${{ toJson(github.event.head_commit.added) }}'

          FILE=$(echo "$FILES" | python3 -c "import sys,json; f=json.load(sys.stdin); print(f[0] if f else '')" 2>/dev/null || true)
          if [ -z "$FILE" ]; then
            FILE=$(echo "$ADDED" | python3 -c "import sys,json; f=json.load(sys.stdin); print(f[0] if f else '')" 2>/dev/null || true)
          fi

          if [ -n "$FILE" ]; then
            ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FILE")
            COLLECTION=$(echo "$FILE" | sed 's|^\([^/]*\)/.*|\1|' | sed 's|^_||')
            CMS_URL="https://app.pagescms.org/ibm-self-serve-assets/bob-innovation-hub/main/collection/${COLLECTION}/edit/${ENCODED}"
          else
            CMS_URL="https://app.pagescms.org/ibm-self-serve-assets/bob-innovation-hub"
          fi

          echo "url=$CMS_URL" >> "$GITHUB_OUTPUT"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Send email notification
        env:
          EMAIL_TO: ${{ vars.NOTIFY_EMAIL_TO }}
          EMAIL_CC: ${{ vars.NOTIFY_EMAIL_CC }}
          EMAIL_FROM: ${{ vars.NOTIFY_EMAIL_FROM }}
          COMMIT_REPO: ${{ github.repository }}
          COMMIT_BRANCH: ${{ github.ref_name }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_EMAIL: ${{ github.event.head_commit.author.email }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          CMS_FILE: ${{ steps.cms_url.outputs.file }}
          CMS_URL: ${{ steps.cms_url.outputs.url }}
        run: |
          cat > /tmp/send_email.py << 'PYEOF'
import json, os, urllib.request

body = (
  "A content update was made via Pages CMS.\n\n"
  f"Repo:    {os.environ['COMMIT_REPO']}\n"
  f"Branch:  {os.environ['COMMIT_BRANCH']}\n"
  f"Author:  {os.environ['COMMIT_AUTHOR']} ({os.environ['COMMIT_EMAIL']})\n"
  f"File:    {os.environ['CMS_FILE']}\n"
  f"Message: {os.environ['COMMIT_MSG']}\n\n"
  f"Edit in Pages CMS: {os.environ['CMS_URL']}\n\n"
  f"View commit: {os.environ['COMMIT_URL']}"
)

payload = {
  "emailTo":      json.loads(os.environ['EMAIL_TO']),
  "emailCC":      json.loads(os.environ['EMAIL_CC']),
  "emailFrom":    os.environ['EMAIL_FROM'],
  "emailSubject": "Content updated in bob-innovation-hub",
  "emailBody":    body,
}

data = json.dumps(payload).encode()
req = urllib.request.Request(
  "https://email-service.1yeewjjgn169.us-east.codeengine.appdomain.cloud/send-email",
  data=data,
  headers={"Content-Type": "application/json", "accept": "application/json"},
  method="POST",
)
with urllib.request.urlopen(req) as resp:
  print(resp.status, resp.read().decode())
PYEOF
          python3 /tmp/send_email.py
