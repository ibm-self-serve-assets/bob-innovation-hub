name: Notify on Pages CMS Commit

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run if the commit message contains "(via Pages CMS)"
    if: contains(github.event.head_commit.message, '(via Pages CMS)')

    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          subject: "Content updated in bob-innovation-hub"
          body: |
            A content update was made via Pages CMS.

            Repo:    ${{ github.repository }}
            Branch:  ${{ github.ref_name }}
            Author:  ${{ github.event.head_commit.author.name }} (${{ github.event.head_commit.author.email }})
            Commit:  ${{ github.event.head_commit.id }}
            Message: ${{ github.event.head_commit.message }}

            View commit: ${{ github.event.head_commit.url }}
