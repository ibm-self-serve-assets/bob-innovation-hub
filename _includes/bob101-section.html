<!-- IBM Bob 101 Section -->
<div id="bob101-section" class="content-section">
  <h2 class="section-title">📚 Bob 101</h2>
  <div id="bob101-container" class="cards-grid">

    {% if site.bob101.size > 0 %}
      {% for item in site.bob101 %}
        <div class="asset-card" data-title="{{ item.title | downcase }}" data-content="{{ item.content | strip_html | downcase }}">
          <h3>{{ item.title }}</h3>
          <div class="card-body">
            {{ item.content }}
          </div>
          {% if item.link %}
            <div style="margin-top: 1rem;">
              <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer" style="color: var(--accent-primary); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem;">
                🔗 View Document
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.7;"><path d="M10.5 1.5L1.5 10.5M10.5 1.5H3M10.5 1.5V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </a>
            </div>
          {% endif %}
        </div>
      {% endfor %}
    {% else %}
      <div class="asset-card" style="grid-column: 1 / -1;">
        <div class="empty-state">
          <p>No Bob 101 documents found. Add documents from your Pages CMS manager to populate this section.</p>
        </div>
      </div>
    {% endif %}

  </div>
  <div id="bob101-pagination" class="pagination"></div>
</div>
