# Section Configuration for Bob Innovation Hub
# Add new sections here to automatically include them in the navigation and content areas

sections:
  - id: introduction
    title: Introduction
    icon: "" #🏠
    show_search: false
    type: custom
    include_file: introduction-section.html

  - id: documentation
    title: Documentation
    description: "Browse official Bob documentation to get started, explore features, and find answers to common questions."
    icon: "" #📄
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: official-documentation
        title: Official Documentation
        collection: documentation
        filter_key: type
        filter_value: "Official Documentation"
      - id: pricing-plan
        title: Pricing Plan
        collection: documentation
        filter_key: type
        filter_value: "Pricing Plan"
    link_text: View Document
    empty_message: No documentation found. Add documents from your Pages CMS manager to populate this section.

  - id: learning-resources
    title: Learning Resources
    description: "Whether you are starting from scratch or looking to sharpen your skills, complete our curated learning plans to build your expertise and earn your Bob proficiency badges. Dive deep into technical tutorials designed for hands-on, immersive learning, and explore the core architectural components powering agentic solutions—including IBM MCP servers, MCP, A2A, and AI Gateways."
    icon: "" #🎓
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: learning-path
        title: Learning Path
        collection: learning
        filter_key: type
        filter_value: "Learning"
      - id: explore-bob
        title: Explore Bob
        collection: learning
        filter_key: type
        filter_value: "Explore Bob"
    link_text: View Resource
    empty_message: No learning resources found. Add resources from your Pages CMS manager to populate this section.

  - id: use-cases
    title: Use-Cases
    description: "Discover how IBM Bob solves complex problems through our technical and industry use cases, interactive labs, and product demos. You can leverage these templates as a foundation to build upon and quickly achieve your specific goals."
    icon: "" #📋
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: business-use-cases
        title: Business Use-cases
        icon: "" #💼
        collection: use-cases
        filter_key: type
        filter_value: business
      - id: technical-use-cases
        title: Technical Use-cases
        icon: "" #🔧
        collection: use-cases
        filter_key: type
        filter_value: technical
    link_text: View Use Case
    empty_message: No use cases found. Add new use cases from your Pages CMS manager to populate this deck.

  - id: skills
    title: Skills
    description: "Accelerate your workflow with Skills—reusable instruction sets that teach Bob how to deliver consistent results for specialized tasks. Use them as an immediate starting point to quickly build your own custom use cases."
    icon: "" #🛠️
    show_search: true
    type: custom
    include_file: skills-section.html

  - id: mcp
    title: MCP
    description: "Explore Model Context Protocol (MCP) integrations and tools that extend Bob's capabilities."
    icon: "" #🔌
    show_search: true
    type: collection
    collection: mcp
    link_text: View MCP
    empty_message: No MCP entries found. Add entries from your Pages CMS manager to populate this section.

  - id: subagents
    title: Subagents
    description: "Discover community-built subagents that extend Bob's capabilities for specialised tasks and workflows."
    icon: "" #🤖
    show_search: true
    type: collection
    collection: subagents
    link_text: View on GitHub
    empty_message: No subagents found. Add subagents from your Pages CMS manager to populate this section.

  - id: modes
    title: Modes
    description: "Modes are specialized personas that tailor Bob's behavior to your specific tasks, offering distinct capabilities and access levels to maximize your efficiency. Explore premium modes designed for legacy modernization, or leverage custom modes for specialized scenarios. These custom modes serve as an adaptable foundation, allowing you to further personalize Bob to perfectly match your unique requirements."
    icon: "" #🤖
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: custom-modes
        title: Custom Modes
        icon: "" #🤖
        collection: modes
      - id: premium-modes
        title: Premium Modes
        icon: "" #⭐
        collection: modes
        filter_key: premium
        filter_value: true
    link_text: View on GitHub
    empty_message: No modes found. Use Pages CMS to add initial configurations.

  - id: case-studies
    title: Case Studies
    description: "Explore real-world case studies showcasing how Bob delivers value across industries."
    icon: "" #📊
    show_search: true
    type: collection
    collection: case_studies
    link_text: View Case Study
    empty_message: No case studies found. Add case studies from your Pages CMS manager to populate this section.

  - id: bob-community
    title: Bob Community
    description: "Connect with the Bob community—find collaboration channels, events, and resources to engage with fellow Bob users."
    icon: "" #👥
    show_search: true
    type: collection
    collection: bob_community
    link_text: View Resource
    empty_message: No community resources found. Add resources from your Pages CMS manager to populate this section.

