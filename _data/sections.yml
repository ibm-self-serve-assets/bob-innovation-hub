# Section Configuration for Bob Innovation Hub
# Add new sections here to automatically include them in the navigation and content areas

sections:
  - id: introduction
    title: Introduction
    icon: "" #🏠
    show_search: false
    type: custom
    include_file: introduction-section.html

  - id: documentation
    title: Documentation
    icon: "" #📄
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: official-documentation
        title: Official Documentation
        collection: documentation
        filter_key: type
        filter_value: "Official Documentation"
      - id: pricing-plan
        title: Pricing Plan
        collection: documentation
        filter_key: type
        filter_value: "Pricing Plan"
    link_text: View Document
    empty_message: No documentation found. Add documents from your Pages CMS manager to populate this section.

  - id: learning-resources
    title: Learning Resources
    icon: "" #🎓
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: learning-path
        title: Learning Path
        collection: learning
        filter_key: type
        filter_value: "Learning"
      - id: explore-bob
        title: Explore Bob
        collection: learning
        filter_key: type
        filter_value: "Explore Bob"
    link_text: View Resource
    empty_message: No learning resources found. Add resources from your Pages CMS manager to populate this section.

  - id: use-cases
    title: Use-Cases
    icon: "" #📋
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: business-use-cases
        title: Business Use-cases
        icon: "" #💼
        collection: use-cases
        filter_key: type
        filter_value: business
      - id: technical-use-cases
        title: Technical Use-cases
        icon: "" #🔧
        collection: use-cases
        filter_key: type
        filter_value: technical
    link_text: View Use Case
    empty_message: No use cases found. Add new use cases from your Pages CMS manager to populate this deck.

  - id: skills
    title: Skills
    icon: "" #🛠️
    show_search: true
    type: custom
    include_file: skills-section.html

  - id: mcp
    title: MCP
    icon: "" #🔌
    show_search: true
    type: collection
    collection: mcp
    link_text: View MCP
    empty_message: No MCP entries found. Add entries from your Pages CMS manager to populate this section.

  - id: subagents
    title: Subagents
    icon: "" #🤖
    show_search: true
    type: collection
    collection: subagents
    link_text: View on GitHub
    empty_message: No subagents found. Add subagents from your Pages CMS manager to populate this section.

  - id: modes
    title: Modes
    icon: "" #🤖
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: custom-modes
        title: Custom Modes
        icon: "" #🤖
        collection: modes
      - id: premium-modes
        title: Premium Modes
        icon: "" #⭐
        collection: modes
        filter_key: premium
        filter_value: true
    link_text: View on GitHub
    empty_message: No modes found. Use Pages CMS to add initial configurations.

  - id: case-studies
    title: Case Studies
    icon: "" #📊
    show_search: true
    type: collection
    collection: case_studies
    link_text: View Case Study
    empty_message: No case studies found. Add case studies from your Pages CMS manager to populate this section.

  - id: bob-community
    title: Bob Community
    icon: "" #👥
    show_search: true
    type: collection
    collection: bob_community
    link_text: View Resource
    empty_message: No community resources found. Add resources from your Pages CMS manager to populate this section.

