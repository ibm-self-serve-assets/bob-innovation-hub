  - id: modes
    title: Modes
    icon: "" #🤖
    show_search: true
    type: collection-tabbed
    sub_sections:
      - id: premium-modes
        title: Premium Modes
        icon: "" #⭐
        collection: modes
        filter_key: premium
        filter_value: true
      - id: custom-modes
        title: Custom Modes
        icon: "" #🤖
        collection: modes
    link_text: View on GitHub
    empty_message: No modes found. Use Pages CMS to add initial configurations.

  - id: skills
    title: Skills
    icon: "" #🛠️
    show_search: true
    type: custom
    include_file: skills-section.html

  - id: bob101
    title: Additional Resources
    icon: "" #📘
    show_search: true
    type: custom
    include_file: bob101-section.html



