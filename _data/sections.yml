# Section Configuration for Bob Innovation Hub
# Add new sections here to automatically include them in the navigation and content areas

sections:
  - id: introduction
    title: Introduction
    icon: 📖
    show_search: false
    type: custom
    include_file: introduction-section.html

  - id: modes
    title: Bob Modes
    icon: 🤖
    show_search: true
    type: collection
    collection: modes
    link_text: View on GitHub
    empty_message: No application presets compiled. Use Pages CMS to add initial configurations.

  - id: labs
    title: Hands-on Labs
    icon: 🚀
    show_search: true
    type: collection
    collection: labs
    link_text: View Lab
    empty_message: No active labs found. Add new labs from your Pages CMS manager to populate this deck.
    
  - id: use-cases
    title: Use Cases
    icon: 📋
    show_search: true
    type: collection
    collection: use-cases
    link_text: View Use Case
    empty_message: No use cases found. Add new use cases from your Pages CMS manager to populate this deck.

  - id: demos
    title: Demos
    icon: 💻
    show_search: true
    type: collection
    collection: demos
    link_text: View Demos
    empty_message: No demos found. Add new demos from your Pages CMS manager to populate this deck.


