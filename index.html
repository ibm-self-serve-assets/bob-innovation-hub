---
layout: null
title: Bobathon Hub
---

<!-- Link to external CSS -->
<link rel="stylesheet" href="assets/css/styles.css">

<!-- Theme Toggle Button -->
<div class="theme-toggle-container">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <span class="theme-toggle-icon" id="themeIcon">🌙</span>
    <span id="themeText">Dark</span>
  </button>
</div>

<!-- Main Layout with Sidebar -->
<div class="main-layout">
  <!-- Left Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Bob Innovation Hub</h2>
    </div>
    <nav class="sidebar-nav" role="navigation">
      {% for section in site.data.sections.sections %}
      <button class="sidebar-button {% if forloop.first %}active{% endif %}" 
              data-section="{{ section.id }}" 
              aria-label="{{ section.title }}">
        <span class="icon">{{ section.icon }}</span>
        <span>{{ section.title }}</span>
      </button>
      {% endfor %}
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">

    <!-- Search Bar -->
    <div class="search-container">
      <input
        type="text"
        id="searchBar"
        class="search-bar"
        placeholder="🔍 Search ..."
        aria-label="Search content"
      >
    </div>

    <!-- Introduction Section -->
    {% include introduction-section.html %}

    <!-- Labs Section -->
    {% include labs-section.html %}

    <!-- Modes Section -->
    {% include modes-section.html %}

  </main>
</div>

<!-- Link to external JavaScript -->
<script src="assets/js/main.js"></script>
