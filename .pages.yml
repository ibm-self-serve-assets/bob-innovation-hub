settings:
  commit:
    identity: user
media:
  - name: docs
    input: docs/slide_decks
    output: /docs/slide_decks
    rename: false
    categories: [document]
    extensions: [pdf, PDF]
  - name: diagrams
    label: Architecture Diagrams
    input: docs/diagrams
    output: /docs/diagrams
    rename: false
    categories: [image]
content:
  - name: documentation
    label: "Documentation"
    type: collection
    path: _documentation
    fields:
      - name: id
        label: "ID (auto-generated)"
        type: uuid
        options:
          editable: false
      - name: title
        label: "Documentation Title"
        type: string
        required: true
      - name: body
        label: "Documentation Description"
        type: rich-text
        required: true
      - name: link
        label: "Documentation Link"
        type: string
        required: true
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  - name: learning-content
    label: "Bob Learning Content"
    type: collection
    path: _learning
    fields:
      - name: id
        label: "ID (auto-generated)"
        type: uuid
        options:
          editable: false
      - name: title
        label: "Document Title"
        type: string
        required: true
      - name: body
        label: "Document Description"
        type: rich-text
        required: true
      - name: type
        label: "Type"
        type: select
        required: true
        options:
         values: ["Learning", "Explore Bob"]
         multiple: false
         placeholder: "Resource Type"
      - name: outcomes
        label: "What we will learn"
        type: rich-text
        required: true
      - name: duration
        label: "duration"
        type: string
        required: true
      - name: link
        label: "Document Link"
        type: string
        required: true
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  - name: use-cases
    label: "📋 Bob Usecases"
    type: collection
    path: _use-cases
    fields:
      - name: id
        label: "ID (auto-generated)"
        type: uuid
        options:
          editable: false
      - name: title
        label: "Use-case Title"
        type: string
        required: true
      - name: asset-owner
        label: "Asset Owner Email"
        type: string
        required: true
      - name: team
        label: "Team"
        type: select
        required: true
        options:
         values: ["Service Engineering", "Other"]
         multiple: false
         placeholder: "Asset Owner Team"
      - name: type
        label: "Type"
        type: select
        required: true
        options:
         values: ["Technical", "Business"]
         multiple: false
         placeholder: "Use-case Type"
      - name: domain
        label: "Domain"
        type: select
        required: true
        options:
         values: ["Data", "Automation", "Security", "Modernization","BFSI","Healthcare","SupplyChain","Transport & Logistics","Energy & Utilities","Travel","Entertainment"]
         multiple: false
         placeholder: "Select Domain"
      - name: body
        label: "Use-case Description"
        type: rich-text
        required: true
      - name: problem
        label: "Use-case problem statement"
        type: rich-text
        required: true
      - name: solution
        label: "Use-case solution description"
        type: rich-text
        required: true
      - name: business-value
        label: "Use-case Business value(use bullet points)"
        type: rich-text
        required: false
      - name: tech-stack
        label: "Tech Products Used"
        type: select
        required: true
        options:
         values: ["Apptio", "Cloud Sync", "Cloudability", "Concert", "Concert for Z", "Db2 Analytics Accelerator", "Data Gate for watsonx", "Guardium", "IBM API Connect", "IBM App Connect", "IBM Bob", "IBM Confluent", "IBM MQ", "IBM Network Intelligence", "Instana", "JSphere Suite for Java", "Kubecost", "Maximo", "NS1 Connect", "Planning Analytics", "Red Hat Ansible", "Red Hat OpenShift", "SevOne", "Terraform", "Turbonomic", "Vault", "Verify", "watsonx Assistant for Z", "watsonx Orchestrate", "watsonx.data", "watsonx.data (OpenRAG)", "watsonx.data integration", "watsonx.data intelligence", "watsonx.governance", "webMethods Hybrid Integration", "zSecure Compliance"]
         multiple: true
         placeholder: "Select Products"
      - name: architecture_diagram
        label: Architecture Diagram
        type: image
        options:
          media: diagrams
        required: false
      - name: demo
        label: "Demo Link"
        type: string
        required: false
      - name: lab
        label: "Lab Link"
        type: string
        required: false
      - name: mode
        label: "Mode Link"
        type: string
        required: false
      - name: skill
        label: "Skill Link"
        type: string
        required: false
      - name: slide_deck
        label: "Slide Deck(.pdf Only)"
        type: file
        options:
          media: docs
          path: docs/slide_decks
          extensions: [pdf, PDF]
        required: false
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  
