settings:
  commit:
    identity: user
media:
  name: docs
  input: docs/slide_decks
  output: /docs/slide_decks
  rename: false
  categories: [document]
  extensions: [pdf, PDF]
content:
  - name: modes
    label: "🤖 Bob Modes"
    type: collection
    path: _modes
    fields:
      - name: title
        label: "Mode Name"
        type: string
        required: true
      - name: asset-owner
        label: "Asset Owner Email"
        type: string
        required: true
      - name: team
        label: "Team"
        type: select
        required: true
        options:
         values: ["Service Engineering", "Other"]
         multiple: false
         placeholder: "Asset Owner Team"
      - name: type
        label: "Type"
        type: select
        required: true
        options:
         values: ["Premium", "Custom"]
         multiple: false
         placeholder: "Use-case Type"
      - name: industry
        label: "Industry"
        type: select
        required: true
        options:
          values: ["Cross","AI", "Marketing", "Sales", "Customer Service", "Finance", "HR", "Operations", "Other"]
          placeholder: "Select Industry"
          multiple: true
      - name: body
        label: "Mode Description"
        type: rich-text
        required: true
      - name: link
        label: "Mode Github Link"
        type: string
        required: true
      - name : demo
        label: "Mode Demo Link"
        type: string
        required: false
      - name: lab
        label: "Mode Lab Link"
        type: string
        required: false
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  - name: use-cases
    label: "📋 Bob Usecases"
    type: collection
    path: _use-cases
    fields:
      - name: id
        label: "ID (auto-generated)"
        type: uuid
        options:
          editable: false
      - name: title
        label: "Use-case Title"
        type: string
        required: true
      - name: asset-owner
        label: "Asset Owner Email"
        type: string
        required: true
      - name: team
        label: "Team"
        type: select
        required: true
        options:
         values: ["Service Engineering", "Other"]
         multiple: false
         placeholder: "Asset Owner Team"
      - name: type
        label: "Type"
        type: select
        required: true
        options:
         values: ["Technical", "Business"]
         multiple: false
         placeholder: "Use-case Type"
      - name: domain
        label: "Domain"
        type: select
        required: true
        options:
         values: ["Data", "Automation", "Security", "Modernization"]
         multiple: false
         placeholder: "Select Domain"
      - name: body
        label: "Use-case Description"
        type: rich-text
        required: true
      - name: link
        label: "Use-case Link"
        type: string
        required: false
      - name: demo
        label: "Demo Link"
        type: string
        required: false
      - name: lab
        label: "Lab Link"
        type: string
        required: false
      - name: mode
        label: "Mode Link"
        type: string
        required: false
      - name: skill
        label: "Skill Link"
        type: string
        required: false
      - name: slide_deck
        label: Slide Deck
        type: file
        options:
          media: docs
          path: docs/slide_decks
          extensions: [pdf, PDF]
        required: false
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  - name: learning-content
    label: "Bob Learning Content"
    type: collection
    path: _learning
    fields:
      - name: title
        label: "Document Title"
        type: string
        required: true
      - name: body
        label: "Document Description"
        type: rich-text
        required: true
      - name: link
        label: "Document Link"
        type: string
        required: true
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  - name: bob101
    label: "Bob 101"
    type: collection
    path: _bob101
    fields:
      - name: title
        label: "Document Title"
        type: string
        required: true
      - name: body
        label: "Document Description"
        type: rich-text
        required: true
      - name: link
        label: "Document Link"
        type: string
        required: true
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50
  - name: skills
    label: "🤖 Bob Skills"
    type: collection
    path: _skills
    fields:
      - name: title
        label: "Skill Name"
        type: string
        required: true
      - name: asset-owner
        label: "Asset Owner Email"
        type: string
        required: true
      - name: team
        label: "Team"
        type: select
        required: true
        options:
         values: ["Service Engineering", "Other"]
         multiple: false
         placeholder: "Asset Owner Team"
      - name: industry
        label: "Industry"
        type: select
        required: true
        options:
          values: ["Cross","AI", "Marketing", "Sales", "Customer Service", "Finance", "HR", "Operations", "Other"]
          placeholder: "Select Industry"
          multiple: true
      - name: body
        label: "Skill Description"
        type: rich-text
        required: true
      - name: link
        label: "Skill Github Link"
        type: string
        required: true
      - name: featured
        label: Featured(Skip this field)
        type: number
        options:
          min: 1
          max: 50

# Made with Bob
