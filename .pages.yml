content:
  - name: modes
    label: "🤖 Bob Modes"
    type: collection
    path: _modes
    fields:
      - name: title
        label: "Mode Name"
        type: string
        required: true
      - name: industry
        label: "Industry"
        type: select
        required: true
        options:
          values: ["Cross","AI", "Marketing", "Sales", "Customer Service", "Finance", "HR", "Operations", "Other"]
          placeholder: "Select Industry"
          multiple: true
      - name: body
        label: "Mode Description"
        type: rich-text
        required: true
      - name: link
        label: "Mode Github Link"
        type: string
        required: true
  - name: labs
    label: "🤖 Bob Labs"
    type: collection
    path: _labs
    fields:
      - name: title
        label: "Lab Title"
        type: string
        required: true
      - name: domain
        label: "Domain"
        type: select
        required: true
        options:
         values: ["Data", "Automation"]
         multiple: false
         placeholder: "Select Domain"
      - name: duration
        label: "Estimated Time (e.g., 45 mins)"
        type: string
        required: true
      - name: body
        label: "Lab Description"
        type: rich-text
        required: true
      - name: link
        label: "Lab Link"
        type: string
        required: true

# Made with Bob
